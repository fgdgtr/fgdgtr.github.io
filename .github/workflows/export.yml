name: 📊 Rapport Hebdomadaire Rack

on:
  schedule:
    # Chaque vendredi à 17h00 (UTC)
    - cron: '0 17 * * 5'
  
  # Permet aussi de lancer manuellement
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests reportlab
      
      - name: 🚀 Generate and send report
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RAPPORT_EMAIL: ${{ secrets.RAPPORT_EMAIL }}
        run: |
          python script_rapport.py
      
      - name: 📤 Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport_rack
          path: rapport_rack_hebdo.pdf
          retention-days: 30
      
      - name: ✅ Success notification
        if: success()
        run: echo "✅ Rapport généré et envoyé avec succès!"
      
      - name: ❌ Failure notification
        if: failure()
        run: echo "❌ Erreur lors de la génération du rapport"

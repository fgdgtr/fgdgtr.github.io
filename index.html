<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AUEM — Rack Retour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080808; --card:#111; --card2:#181818; --card3:#1e1e1e;
  --border:#222; --border2:#2a2a2a; --border3:#333;
  --text:#f0f0f0; --text2:#888; --text3:#444;
  --green:#22c55e; --green-bg:#052e16;
  --yellow:#f59e0b; --yellow-bg:#3d1f00;
  --red:#ef4444; --red-bg:#3d0a0a;
  --blue:#3b82f6; --blue-bg:#0d1a35;
  --purple:#a855f7; --purple-bg:#2e1065;
  --r:12px; --rs:8px;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;padding-bottom:72px;overflow-x:hidden;}

/* HEADER */
.header{
  background:rgba(8,8,8,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:11px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{
  width:34px;height:34px;background:var(--text);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:9px;color:#000;letter-spacing:1px;font-family:'DM Mono',monospace;
}
.header-title{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.header-sub{font-size:10px;color:var(--text3);margin-top:1px;transition:color .4s;}
.header-sub.synced{color:var(--green);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all .4s;}
.sync-dot.ok{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.6);}
.sync-dot.loading{background:var(--yellow);animation:pdot .8s ease-in-out infinite alternate;}
.sync-dot.error{background:var(--red);}
@keyframes pdot{to{opacity:.2;}}

/* VIEWS */
.view{display:none;}
.view.active{display:block;animation:fu .2s var(--ease);}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* RACK GRID */
.rack-view{padding:13px;}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;}
.stat-num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;}
.stat-num.b{color:var(--blue);} .stat-num.g{color:var(--green);}
.stat-label{font-size:9px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}

.search-wrap{position:relative;margin-bottom:12px;}
.search-inp{
  width:100%;background:var(--card);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);padding:10px 38px;outline:none;
}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
.filter-btn{
  padding:6px 13px;border-radius:20px;border:1px solid var(--border2);
  background:var(--card);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;
}
.filter-btn.active{background:var(--text);color:#000;}

.etage-section{margin-bottom:20px;}
.etage-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.etage-pill{background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:11px;font-family:'DM Mono',monospace;}
.etage-desc{font-size:11px;color:var(--text3);}
.emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}

.emp-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:10px;cursor:pointer;min-height:80px;position:relative;transition:transform .1s;
}
.emp-card.occupied{border-color:var(--blue);}
.emp-card:active{transform:scale(.95);}
.emp-id{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
.emp-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;background:var(--card2);color:var(--text3);margin:4px 0;}
.emp-badge.has{background:var(--blue-bg);color:var(--blue);}
.emp-previews{font-size:9px;color:var(--text2);font-family:'DM Mono',monospace;display:flex;flex-direction:column;gap:2px;}

.sep-rack{display:flex;align-items:center;gap:8px;margin:15px 0;}
.sep-line{flex:1;height:1px;background:var(--border);}
.sep-label{font-size:9px;color:var(--text3);letter-spacing:2px;}

/* FORM & BUTTONS */
.back-header{background:var(--bg);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;}
.btn-back{width:34px;height:34px;background:var(--card2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);cursor:pointer;}
.view-body{padding:13px;}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:10px;}
.section-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.inp, .sel{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:10px;margin-bottom:8px;outline:none;}
.btn-main{width:100%;background:var(--text);color:#000;border:none;border-radius:var(--rs);padding:12px;font-weight:700;cursor:pointer;}

/* COLIS CARD */
.colis-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;}
.colis-body{flex:1;}
.colis-client{font-weight:700;font-family:'DM Mono',monospace;}
.colis-company{font-size:11px;color:var(--yellow);}
.colis-acts{display:flex;gap:5px;}
.btn-circ{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card3);padding:10px 20px;border-radius:20px;transition:0.3s;z-index:999;font-weight:600;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);padding:12px;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nav-btn.active{color:var(--text);}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">AUEM</div>
    <div>
      <div class="header-title">Rack Retour</div>
      <div class="header-sub" id="sync-label">Synchronisation…</div>
    </div>
  </div>
  <div class="sync-dot loading" id="sync-dot"></div>
</div>

<div class="view active" id="view-rack">
  <div class="rack-view">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num b" id="s-total">—</div><div class="stat-label">Colis</div></div>
      <div class="stat-card"><div class="stat-num g" id="s-locs">—</div><div class="stat-label">Occupés</div></div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Tout</button>
      <button class="filter-btn" id="f-occ" onclick="setFilter('occ')">Occupés</button>
      <button class="filter-btn" id="f-empty" onclick="setFilter('empty')">Vides</button>
    </div>
    <div id="rack-grid"></div>
  </div>
</div>

<div class="view" id="view-colonne">
  <div class="back-header">
    <button class="btn-back" onclick="showRack()">←</button>
    <div><div class="bh-title" id="col-title">A1</div><div class="bh-sub" id="col-sub">Chargement...</div></div>
  </div>
  <div class="view-body">
    <div class="section">
      <div class="section-lbl">Ajouter un colis</div>
      <input class="inp" id="inp-client" placeholder="N° Client" />
      <input class="inp" id="inp-company" placeholder="Entreprise" />
      <input class="inp" id="inp-afs" placeholder="N° AFS (ex: 1234, 5678)" />
      <div id="space-row" style="display:none;">
        <select class="sel" id="inp-space">
          <option value="">Reste de la place ?</option>
          <option value="oui">✅ Oui</option>
          <option value="un-peu">⚠️ Un peu</option>
          <option value="non">❌ Non</option>
        </select>
      </div>
      <button class="btn-main" onclick="addColis()">+ Ajouter au rack</button>
    </div>
    <div id="colis-list"></div>
  </div>
</div>

<div class="toast" id="toast">Message</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showRack()"><span>📦</span>Rack</button>
  <button class="nav-btn" onclick="showToast('Bientôt disponible','✨')"><span>⚙️</span>Paramètres</button>
</div>

<script>
const ETAGES = ['D','C','B','A'];
const ETAGE_INFO = {
  'D':{name:'Étage D', desc:'Haut — Gerbeur'},
  'C':{name:'Étage C', desc:'Milieu — Gerbeur'},
  'B':{name:'Étage B', desc:'Hauteur d\'homme'},
  'A':{name:'Étage A', desc:'Sol'},
};
const COLS = 6;
const FIREBASE = 'https://auem-rac-default-rtdb.europe-west1.firebasedatabase.app/retour.json';

let state = {}, currentCol = null, activeFilter = 'all';

function initState() {
  const s = {};
  ETAGES.forEach(e => { for(let i=1;i<=COLS;i++) s[e+i] = {colis:[]}; });
  return s;
}

async function loadFromServer() {
  document.getElementById('sync-dot').className = 'sync-dot loading';
  try {
    const res = await fetch(FIREBASE);
    const data = await res.json();
    state = data || initState();
    document.getElementById('sync-dot').className = 'sync-dot ok';
    document.getElementById('sync-label').textContent = 'Synchronisé';
    renderRack();
  } catch(e) {
    document.getElementById('sync-dot').className = 'sync-dot error';
    showToast('Erreur de connexion','📡');
  }
}

async function saveToServer() {
  try {
    await fetch(FIREBASE, {method:'PUT', body:JSON.stringify(state)});
    document.getElementById('sync-dot').className = 'sync-dot ok';
  } catch(e) {
    document.getElementById('sync-dot').className = 'sync-dot error';
  }
}

function renderRack() {
  const grid = document.getElementById('rack-grid');
  grid.innerHTML = '';
  let totalColis = 0, totalOcc = 0;

  ETAGES.forEach(etage => {
    const sec = document.createElement('div');
    sec.className = 'etage-section';
    sec.innerHTML = `<div class="etage-header"><span class="etage-pill">${ETAGE_INFO[etage].name}</span><span class="etage-desc">${ETAGE_INFO[etage].desc}</span></div>`;
    
    const g = document.createElement('div');
    g.className = 'emp-grid';

    for(let i=1; i<=COLS; i++) {
      const id = etage + i;
      const colisList = state[id]?.colis || [];
      const active = colisList.filter(c => !c.done);
      
      if(active.length > 0) totalOcc++;
      totalColis += active.length;

      // Filtre
      if(activeFilter === 'occ' && active.length === 0) continue;
      if(activeFilter === 'empty' && active.length > 0) continue;

      const card = document.createElement('div');
      card.className = 'emp-card' + (active.length > 0 ? ' occupied' : '');
      card.onclick = () => openColonne(id);
      
      let html = `<div class="emp-id">${id}</div>`;
      html += `<div class="emp-badge ${active.length>0?'has':''}">${active.length || 'Vide'}</div>`;
      html += `<div class="emp-previews">`;
      active.slice(0, 2).forEach(c => html += `<span>${c.client}</span>`);
      
      // LOGIQUE SPÉCIALE B4, B5, B6
      if(['B4','B5','B6'].includes(id) && active.length > 0) {
        const last = active[active.length - 1];
        if(last.space) {
          const icon = {'oui':'✅','un-peu':'⚠️','non':'❌'}[last.space];
          html += `<span style="color:var(--green);font-weight:bold;margin-top:2px;">Place: ${icon}</span>`;
        }
      }
      html += `</div>`;
      
      card.innerHTML = html;
      g.appendChild(card);
    }
    sec.appendChild(g);
    if(etage === 'B') sec.innerHTML += '<div class="sep-rack"><div class="sep-line"></div><div class="sep-label">ACCESSIBLE</div><div class="sep-line"></div>';
    grid.appendChild(sec);
  });

  document.getElementById('s-total').textContent = totalColis;
  document.getElementById('s-locs').textContent = totalOcc;
}

function openColonne(id) {
  currentCol = id;
  document.getElementById('col-title').textContent = id;
  document.getElementById('col-sub').textContent = ETAGE_INFO[id[0]].name;
  document.getElementById('space-row').style.display = ['B4','B5','B6'].includes(id) ? 'block' : 'none';
  renderColisList();
  navTo('colonne');
}

function addColis() {
  const cli = document.getElementById('inp-client').value.trim();
  if(!cli) return showToast('Client manquant','⚠️');
  
  const colis = {
    client: cli,
    company: document.getElementById('inp-company').value.trim(),
    afs: document.getElementById('inp-afs').value.split(','),
    space: document.getElementById('inp-space').value,
    done: false
  };

  if(!state[currentCol]) state[currentCol] = {colis:[]};
  state[currentCol].colis.push(colis);
  saveToServer();
  renderColisList();
  document.getElementById('inp-client').value = '';
}

function renderColisList() {
  const list = document.getElementById('colis-list');
  list.innerHTML = '';
  const items = state[currentCol]?.colis || [];
  
  items.forEach((c, idx) => {
    const div = document.createElement('div');
    div.className = 'colis-card';
    div.style.opacity = c.done ? '0.4' : '1';
    div.innerHTML = `
      <div class="colis-body">
        <div class="colis-client">${c.client}</div>
        <div class="colis-company">${c.company || ''}</div>
      </div>
      <div class="colis-acts">
        <button class="btn-circ" onclick="toggleColis(${idx})">${c.done ? '✓' : '○'}</button>
        <button class="btn-circ" onclick="deleteColis(${idx})">×</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function toggleColis(idx) {
  state[currentCol].colis[idx].done = !state[currentCol].colis[idx].done;
  saveToServer();
  renderColisList();
}

function deleteColis(idx) {
  state[currentCol].colis.splice(idx, 1);
  saveToServer();
  renderColisList();
}

function navTo(vid) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+vid).classList.add('active');
}

function showRack() { navTo('rack'); renderRack(); }

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  renderRack();
}

function showToast(msg, ico='') {
  const t = document.getElementById('toast');
  t.textContent = ico + ' ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
loadFromServer();
setInterval(loadFromServer, 10000); // Sync auto toutes les 10s
</script>
</body>
</html>
